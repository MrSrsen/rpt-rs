name: release

# Publish a GitHub Release with cross-platform binaries whenever a version tag
# (e.g. v1.2.3) is pushed. Tags are normally created on master, so pushing a
# tagged commit there triggers a release build.
on:
  push:
    tags:
      - "v*"

# Needed to create the release/upload assets (contents) and push the image to
# the GitHub Container Registry (packages).
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Builds both binaries for the target, archives them (.tar.gz on Unix,
      # .zip on Windows) with a sha256 checksum, creates the GitHub Release for
      # the tag if it does not exist yet, and uploads the archive as an asset.
      - name: Build and upload binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rpt,rpt-to-xml
          target: ${{ matrix.target }}
          archive: rpt-rs-$tag-$target
          include: README.md,LICENSE
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build the Docker image and push it to the GitHub Container Registry, tagged
  # with the release version and `latest`. The image lives alongside the release
  # under the repository's Packages.
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
